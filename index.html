<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sprint</title>

<style>
:root {
  --negro: #000;
  --blanco: #fff;
  --gris: #f2f2f2;
}

/* GENERAL */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: var(--blanco);
  color: var(--negro);
}

/* HERO */
.hero {
  position: relative;
  height: 350px;
  background: url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  text-align: center;
  z-index: 2;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 30px;
  height: 120px;
  z-index: 3;
}

/* CONTENIDO */
.container {
  max-width: 900px;
  padding: 30px;
}

/* PRODUCTOS */
.producto {
  background: var(--gris);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.producto:hover {
  transform: translateY(-3px);
}

/* SELECT */
select {
  padding: 10px;
  width: 100%;
  margin: 10px 0;
  border-radius: 5px;
}

/* BOTONES */
button {
  background: var(--negro);
  color: var(--blanco);
  border: none;
  padding: 12px;
  cursor: pointer;
  border-radius: 5px;
}

/* 🔥 BOTÓN CARRITO PRO */
.btn-carrito {
  position: fixed;
  right: 15px;
  bottom: 15px;
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, #000, #333);
  color: white;
  border-radius: 50%;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  transition: all 0.2s ease;
}

.btn-carrito:active {
  transform: scale(0.9);
}

.btn-carrito.animar {
  transform: scale(1.25);
}

/* CONTADOR */
#contador {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #ff0000;
  color: white;
  font-size: 13px;
  font-weight: bold;
  padding: 6px 9px;
  border-radius: 50%;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  .btn-carrito {
    width: 80px;
    height: 80px;
    font-size: 30px;
    bottom: 20px;
    right: 20px;
  }

  #contador {
    font-size: 14px;
    padding: 7px 10px;
  }
}

/* CARRITO */
.carrito {
  position: fixed;
  right: -320px;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.3s;
  z-index: 999;
}

.carrito.activo {
  right: 0;
}

.item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.eliminar {
  background: red;
  padding: 5px;
  font-size: 12px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 100px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px 15px;
  border-radius: 5px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}

#total {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="Sin título-1-02.png" class="logo">
  <div class="hero-content">
    <h1>Las mejores gorras de ciclismo</h1>
    <p>MODELOS · DISEÑOS · PERSONALIZADOS</p>
  </div>
</div>

<div class="container">

  <div class="producto">
    <h3>Producto 1</h3>
    <p>Descripción del producto 1</p>
    <select id="p1">
      <option value="1000">1 unidad - $1000</option>
      <option value="1800">2 unidades - $1800</option>
    </select>
    <button onclick="agregar('Producto 1', 'p1')">Agregar</button>
  </div>

  <div class="producto">
    <h3>Producto 2</h3>
    <p>Descripción del producto 2</p>
    <select id="p2">
      <option value="2000">1 unidad - $2000</option>
      <option value="3500">2 unidades - $3500</option>
    </select>
    <button onclick="agregar('Producto 2', 'p2')">Agregar</button>
  </div>

</div>

<!-- BOTÓN -->
<div class="btn-carrito" id="btnCarrito" onclick="toggleCarrito()">
  🛒
  <span id="contador">0</span>
</div>

<!-- CARRITO -->
<div class="carrito" id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h2>Carrito</h2>
  <ul id="lista"></ul>
  <h3 id="total">Total: $0</h3>
  <button onclick="enviarWhatsApp()">Comprar por WhatsApp</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">Agregado al carrito</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function toggleCarrito() {
  document.getElementById("carrito").classList.toggle("activo");
}

function agregar(nombre, idSelect) {
  let select = document.getElementById(idSelect);
  let precio = parseInt(select.value);
  let texto = select.options[select.selectedIndex].text;

  carrito.push({nombre, precio, texto});
  guardar();
  actualizar();
  animarBoton();
  mostrarToast();
}

function eliminar(index) {
  carrito.splice(index,1);
  guardar();
  actualizar();
}

function guardar() {
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

function actualizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let total = 0;

  carrito.forEach((item,index) => {
    let li = document.createElement("li");
    li.className = "item";
    li.innerHTML = `
      ${item.nombre} - ${item.texto}
      <button class="eliminar" onclick="eliminar(${index})">X</button>
    `;
    lista.appendChild(li);
    total += item.precio;
  });

  document.getElementById("total").textContent = "Total: $" + total;
  document.getElementById("contador").textContent = carrito.length;

  // CAMBIO DE COLOR SI HAY PRODUCTOS
  if (carrito.length > 0) {
    document.getElementById("btnCarrito").style.background = "linear-gradient(135deg, #ff0000, #ff4d4d)";
  }
}

function animarBoton() {
  let btn = document.getElementById("btnCarrito");
  btn.classList.add("animar");
  setTimeout(() => btn.classList.remove("animar"), 200);
}

function mostrarToast() {
  let toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}

function generarMensaje() {
  let mensaje = "Hola! 👋 Quiero hacer un pedido:%0A%0A";

  carrito.forEach(item => {
    mensaje += "🧢 " + item.nombre + " - " + item.texto + "%0A";
  });

  mensaje += "%0ATotal: $" + carrito.reduce((acc,i)=>acc+i.precio,0);
  mensaje += "%0A%0AGracias!";

  return mensaje;
}

function enviarWhatsApp() {
  let numero = "5491127155891";
  let url = "https://wa.me/" + numero + "?text=" + generarMensaje();
  window.open(url, "_blank");
}

// INICIAL
actualizar();
</script>

</body>
</html>
