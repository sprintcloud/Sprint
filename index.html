<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sprint</title>

<style>
:root { --negro:#000; --blanco:#fff; --gris:#f5f5f5; }

body {
  font-family: Arial;
  margin: 0;
  background: var(--blanco);
}

/* HERO */
.hero {
  position:relative;
  height:320px;
  background:url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content { position:relative; z-index:2; text-align:center; }

/* GRID */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* PRODUCTO */
.producto {
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  text-align:center;
}

.producto img {
  width:100%;
  height:200px;
  object-fit:contain;
}

.producto select {
  width:100%;
  padding:8px;
  margin:10px 0;
}

.producto strong {
  display:block;
  font-size:18px;
  margin:10px 0;
}

/* BOTONES */
button {
  background:black;
  color:white;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  width:100%;
}

/* ADMIN */
.admin {
  display:none;
  background:#111;
  color:white;
  padding:20px;
}

.admin input {
  width:100%;
  margin:5px 0;
  padding:10px;
}

.btn-admin {
  position:fixed;
  bottom:20px;
  left:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:black;
  color:white;
}

/* CARRITO */
.btn-carrito {
  position:fixed;
  top:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
}

#contador {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  padding:5px;
  border-radius:50%;
}

.carrito {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:20px;
  transition:.3s;
}
.carrito.activo { right:0; }

</style>
</head>

<body>

<div class="hero">
  <div class="hero-content">
    <h1>SPRINT</h1>
    <p>Gorras de ciclismo</p>
  </div>
</div>

<button class="btn-admin" onclick="activarAdmin()">⚙️</button>

<div class="admin" id="adminPanel">
  <h2>Agregar producto</h2>
  <input id="nombre" placeholder="Nombre">
  <input id="descripcion" placeholder="Descripción">

  <input id="precio1" placeholder="Precio 1 unidad">
  <input id="precio2" placeholder="Precio 2 unidades">
  <input id="precio3" placeholder="Precio 3 unidades">

  <input type="file" id="imagen">

  <button onclick="guardarProducto()">Guardar producto</button>
</div>

<div class="container" id="productos"></div>

<div class="btn-carrito" onclick="toggleCarrito()">🛒
<span id="contador">0</span>
</div>

<div class="carrito" id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h2>Carrito</h2>
  <ul id="lista"></ul>
  <h3 id="total">Total: $0</h3>
  <button onclick="enviarWhatsApp()">Comprar</button>
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function toggleCarrito(){
  document.getElementById("carrito").classList.toggle("activo");
}

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function actualizar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  let total=0;

  carrito.forEach((item,i)=>{
    lista.innerHTML+=`<li>${item.nombre} - $${item.precio}
    <button onclick="eliminar(${i})">X</button></li>`;
    total+=item.precio;
  });

  document.getElementById("total").textContent="Total: $"+total;
  document.getElementById("contador").textContent=carrito.length;
}

function eliminar(i){
  carrito.splice(i,1);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function enviarWhatsApp(){
  let msg="Pedido:%0A";
  carrito.forEach(i=> msg+=i.nombre+" - $"+i.precio+"%0A");
  window.open("https://wa.me/5491127155891?text="+msg);
}

function agregarDesdeSelect(nombre, id){
  let select = document.getElementById("select-"+id);
  let precio = parseInt(select.value);
  agregar(nombre, precio);
}

actualizar();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSyC6p5YWOiGq3XOxmoEbBZKLzO9_7zUsWZI",
  authDomain:"sprinttienda-f52cc.firebaseapp.com",
  projectId:"sprinttienda-f52cc",
  storageBucket:"sprinttienda-f52cc.appspot.com",
  messagingSenderId:"520993829650",
  appId:"1:520993829650:web:8ca662a13b1fc51bc7b9cb"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

/* ADMIN */
window.activarAdmin=function(){
  let clave=prompt("Contraseña");
  if(clave==="1234"){
    document.getElementById("adminPanel").style.display="block";
  }
}

/* GUARDAR */
window.guardarProducto=async function(){
  let nombre=document.getElementById("nombre").value;
  let descripcion=document.getElementById("descripcion").value;

  let precio1=parseInt(document.getElementById("precio1").value);
  let precio2=parseInt(document.getElementById("precio2").value);
  let precio3=parseInt(document.getElementById("precio3").value);

  let file=document.getElementById("imagen").files[0];

  if(!nombre || !descripcion || !precio1 || !precio2 || !precio3 || !file){
    alert("Completa todo");
    return;
  }

  const storageRef=ref(storage,'productos/'+Date.now()+file.name);
  await uploadBytes(storageRef,file);
  const url=await getDownloadURL(storageRef);

  await addDoc(collection(db,"productos"),{
    nombre,
    descripcion,
    imagen:url,
    precios:[
      {cantidad:1, precio:precio1},
      {cantidad:2, precio:precio2},
      {cantidad:3, precio:precio3}
    ]
  });

  alert("Producto guardado");
  cargarProductos();
}

/* CARGAR */
async function cargarProductos(){
  const data=await getDocs(collection(db,"productos"));
  let contenedor=document.getElementById("productos");
  contenedor.innerHTML="";

  data.forEach(docu=>{
    let p=docu.data();

    contenedor.innerHTML+=`
    <div class="producto">
      <img src="${p.imagen}">
      <h3>${p.nombre}</h3>
      <p>${p.descripcion}</p>

      <select id="select-${docu.id}">
        ${p.precios.map(op => 
          `<option value="${op.precio}">
            ${op.cantidad} unidad(es) - $${op.precio}
          </option>`
        ).join("")}
      </select>

      <button onclick="agregarDesdeSelect('${p.nombre}','${docu.id}')">Agregar</button>
    </div>`;
  });
}

cargarProductos();
</script>

</body>
</html>
