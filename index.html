<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sprint</title>

<style>
:root {
  --negro: #000;
  --blanco: #fff;
  --gris: #f2f2f2;
}

/* GENERAL */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: var(--blanco);
  color: var(--negro);
}

/* HERO */
.hero {
  position: relative;
  height: 350px;
  background: url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  text-align: center;
  z-index: 2;
}

.hero h1 {
  font-size: 32px;
  margin: 0;
  letter-spacing: 2px;
}

.hero p {
  margin-top: 10px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* LOGO MÁS GRANDE */
.logo {
  position: absolute;
  top: 20px;
  left: 30px;
  height: 200px; /* AUMENTADO */
  z-index: 3;
}

/* CONTENIDO */
.container {
  max-width: 900px;
  padding: 30px;
}

/* PRODUCTOS */
.producto {
  background: var(--gris);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.producto:hover {
  transform: translateY(-3px);
}

.producto p {
  color: #555;
}

/* SELECT */
select {
  padding: 10px;
  width: 100%;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

/* BOTONES */
button {
  background: var(--negro);
  color: var(--blanco);
  border: none;
  padding: 12px;
  cursor: pointer;
  border-radius: 5px;
  width: 100%;
  transition: 0.3s;
}

button:hover {
  background: #333;
}

/* BOTÓN FLOTANTE */
.btn-carrito {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: black;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  z-index: 1000;
}

/* CARRITO */
.carrito {
  position: fixed;
  right: -320px;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  padding: 20px;
  border-left: 1px solid #ddd;
  transition: 0.3s;
  z-index: 999;
}

.carrito.activo {
  right: 0;
}

.cerrar {
  background: red;
  margin-bottom: 10px;
}

#total {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="Sin título-1-02.png" class="logo">

  <div class="hero-content">
    <h1>Las mejores gorras de ciclismo</h1>
    <p>PERSONALIZA TU GORRITA O SELECCIONA ALGUNO DE NUESTROS DISEÑOS</p>
  </div>
</div>

<div class="container">

  <div class="producto">
    <h3>Producto 1</h3>
    <p>Descripción del producto 1</p>
    <select id="p1">
      <option value="1000">1 unidad - $1000</option>
      <option value="1800">2 unidades - $1800</option>
    </select>
    <button onclick="agregar('Producto 1', 'p1')">Agregar</button>
  </div>

  <div class="producto">
    <h3>Producto 2</h3>
    <p>Descripción del producto 2</p>
    <select id="p2">
      <option value="2000">1 unidad - $2000</option>
      <option value="3500">2 unidades - $3500</option>
    </select>
    <button onclick="agregar('Producto 2', 'p2')">Agregar</button>
  </div>

</div>

<!-- BOTÓN CARRITO -->
<div class="btn-carrito" onclick="toggleCarrito()">🛒</div>

<!-- CARRITO -->
<div class="carrito" id="carrito">
  <button class="cerrar" onclick="toggleCarrito()">Cerrar</button>
  <h2>Carrito</h2>
  <ul id="lista"></ul>
  <h3 id="total">Total: $0</h3>
  <button onclick="enviarWhatsApp()">Comprar por WhatsApp</button>
</div>

<script>
let carrito = [];

function toggleCarrito() {
  document.getElementById("carrito").classList.toggle("activo");
}

function agregar(nombre, idSelect) {
  let select = document.getElementById(idSelect);
  let precio = parseInt(select.value);
  let texto = select.options[select.selectedIndex].text;

  carrito.push({nombre, precio, texto});
  actualizar();
}

function actualizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let total = 0;

  carrito.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.nombre + " - " + item.texto;
    lista.appendChild(li);
    total += item.precio;
  });

  document.getElementById("total").textContent = "Total: $" + total;
}

function generarMensaje() {
  let mensaje = "Hola! 👋 Quiero hacer un pedido:%0A%0A";

  carrito.forEach(item => {
    mensaje += "🧢 " + item.nombre + " - " + item.texto + "%0A";
  });

  mensaje += "%0AGracias!";
  return mensaje;
}

function enviarWhatsApp() {
  let numero = "5491127155891";
  let url = "https://wa.me/" + numero + "?text=" + generarMensaje();
  window.open(url, "_blank");
}
</script>

</body>
</html>
