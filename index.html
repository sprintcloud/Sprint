<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sprint</title>

<style>
:root { --negro:#000; --blanco:#fff; --gris:#f2f2f2; }

body {
  font-family: Arial;
  margin: 0;
  background: var(--blanco);
}

/* HERO */
.hero {
  position:relative;
  height:300px;
  background:url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}
.hero-content { position:relative; z-index:2; text-align:center; }

/* GRID */
.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

@media(max-width:600px){
  .container{ grid-template-columns:1fr; }
}

/* PRODUCTO */
.producto {
  background:#fff;
  border-radius:10px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.producto img{
  width:100%;
  height:180px;
  object-fit:contain;
}

select{
  width:100%;
  padding:8px;
  margin:10px 0;
}

button{
  background:black;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
  width:100%;
}

/* ADMIN */
.admin{
  background:#111;
  color:white;
  padding:20px;
  display:none;
}
.admin input{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.btn-admin{
  position:fixed;
  bottom:15px;
  left:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:black;
  color:white;
}

/* CARRITO */
.btn-carrito{
  position:fixed;
  top:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  color:white;
  font-size:26px;
}

#contador{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  padding:5px;
  border-radius:50%;
}

.carrito{
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:20px;
  transition:.3s;
}
.carrito.activo{ right:0; }
</style>
</head>

<body>

<div class="hero">
  <div class="hero-content">
    <h1>SPRINT</h1>
    <p>Gorras de ciclismo</p>
  </div>
</div>

<button class="btn-admin" onclick="activarAdmin()">⚙️</button>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
  <h2>Agregar producto</h2>
  <input id="nombre" placeholder="Nombre">
  <input id="descripcion" placeholder="Descripción">

  <h3>Precios por cantidad</h3>
  <input id="p1" placeholder="1 unidad">
  <input id="p2" placeholder="2 unidades">
  <input id="p3" placeholder="5 unidades">
  <input id="p4" placeholder="10 unidades">
  <input id="p5" placeholder="20 unidades">
  <input id="p6" placeholder="50 unidades">

  <input type="file" id="imagen">
  <button onclick="guardarProducto()">Guardar producto</button>
</div>

<div class="container">
  <div id="productos"></div>
</div>

<!-- CARRITO -->
<div class="btn-carrito" onclick="toggleCarrito()">🛒
<span id="contador">0</span>
</div>

<div class="carrito" id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h2>Carrito</h2>
  <ul id="lista"></ul>
  <h3 id="total">Total: $0</h3>
  <button onclick="enviarWhatsApp()">Comprar</button>
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function toggleCarrito(){
  document.getElementById("carrito").classList.toggle("activo");
}

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function actualizar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  let total=0;

  carrito.forEach((item,i)=>{
    lista.innerHTML+=`<li>${item.nombre} - $${item.precio}
    <button onclick="eliminar(${i})">X</button></li>`;
    total+=item.precio;
  });

  document.getElementById("total").textContent="Total: $"+total;
  document.getElementById("contador").textContent=carrito.length;
}

function eliminar(i){
  carrito.splice(i,1);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function enviarWhatsApp(){
  let msg="Pedido:%0A";
  carrito.forEach(i=> msg+=i.nombre+" - $"+i.precio+"%0A");
  window.open("https://wa.me/5491127155891?text="+msg);
}

actualizar();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"sprinttienda-f52cc.firebaseapp.com",
  projectId:"sprinttienda-f52cc",
  storageBucket:"sprinttienda-f52cc.appspot.com",
  messagingSenderId:"520993829650",
  appId:"1:520993829650:web:8ca662a13b1fc51bc7b9cb"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

window.activarAdmin=function(){
  if(prompt("Contraseña") === "1234"){
    document.getElementById("adminPanel").style.display="block";
  }
}

window.guardarProducto=async function(){
  let file=document.getElementById("imagen").files[0];

  const precios={
    p1:parseInt(p1.value),
    p2:parseInt(p2.value),
    p3:parseInt(p3.value),
    p4:parseInt(p4.value),
    p5:parseInt(p5.value),
    p6:parseInt(p6.value)
  };

  const storageRef=ref(storage,'productos/'+Date.now()+file.name);
  await uploadBytes(storageRef,file);
  const url=await getDownloadURL(storageRef);

  await addDoc(collection(db,"productos"),{
    nombre:nombre.value,
    descripcion:descripcion.value,
    precios,
    imagen:url
  });

  alert("Producto agregado");
  cargarProductos();
}

async function cargarProductos(){
  const data=await getDocs(collection(db,"productos"));
  productos.innerHTML="";

  data.forEach(doc=>{
    let p=doc.data();

    productos.innerHTML+=`
    <div class="producto">
      <img src="${p.imagen}">
      <h3>${p.nombre}</h3>
      <p>${p.descripcion}</p>

      <select onchange="cambiarPrecio(this)">
        <option value="${p.precios.p1}">1 unidad - $${p.precios.p1}</option>
        <option value="${p.precios.p2}">2 unidades - $${p.precios.p2}</option>
        <option value="${p.precios.p3}">5 unidades - $${p.precios.p3}</option>
        <option value="${p.precios.p4}">10 unidades - $${p.precios.p4}</option>
        <option value="${p.precios.p5}">20 unidades - $${p.precios.p5}</option>
        <option value="${p.precios.p6}">50 unidades - $${p.precios.p6}</option>
      </select>

      <button onclick="agregar('${p.nombre}', this.previousElementSibling.value)">Agregar</button>
    </div>`;
  });
}

cargarProductos();
</script>

</body>
</html>
