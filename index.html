<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sprint</title>

<style>
:root { --negro:#000; --blanco:#fff; --gris:#f2f2f2; }

body {
  font-family: Arial;
  margin: 0;
  background: var(--blanco);
}

.hero {
  position:relative;
  height:300px;
  background:url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}
.hero-content { position:relative; z-index:2; text-align:center; }

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}
@media(max-width:600px){
  .container{ grid-template-columns:1fr; }
}

.producto {
  background:#fff;
  border-radius:10px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.producto img{
  width:100%;
  height:180px;
  object-fit:contain;
}

input, button{
  width:100%;
  padding:8px;
  margin:5px 0;
}

button{
  background:black;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* ADMIN */
.admin{
  background:#111;
  color:white;
  padding:20px;
  display:none;
}
.btn-admin{
  position:fixed;
  bottom:15px;
  left:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:black;
  color:white;
}

/* CARRITO */
.btn-carrito{
  position:fixed;
  top:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  color:white;
  font-size:26px;
}
#contador{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  padding:5px;
  border-radius:50%;
}
.carrito{
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:20px;
  transition:.3s;
}
.carrito.activo{ right:0; }
</style>
</head>

<body>

<div class="hero">
  <div class="hero-content">
    <h1>SPRINT</h1>
    <p>Gorras de ciclismo</p>
  </div>
</div>

<button class="btn-admin" onclick="activarAdmin()">⚙️</button>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
  <h2>Agregar producto</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="descripcion" placeholder="Descripción">

  <h3>Precios</h3>
  <input id="p1" placeholder="1 unidad">
  <input id="p2" placeholder="2-3 unidades">
  <input id="p3" placeholder="4-10 unidades">
  <input id="p4" placeholder="10-30 unidades">
  <input id="p5" placeholder="30-100 unidades">

  <input type="file" id="imagen">
  <button onclick="guardarProducto()">Guardar producto</button>
</div>

<div class="container">
  <div id="productos"></div>
</div>

<!-- CARRITO -->
<div class="btn-carrito" onclick="toggleCarrito()">🛒
<span id="contador">0</span>
</div>

<div class="carrito" id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h2>Carrito</h2>
  <ul id="lista"></ul>
  <h3 id="total">Total: $0</h3>
  <button onclick="enviarWhatsApp()">Comprar</button>
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function toggleCarrito(){
  document.getElementById("carrito").classList.toggle("activo");
}

function agregar(nombre, precio, cantidad){
  carrito.push({nombre, precio, cantidad});
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function actualizar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  let total=0;

  carrito.forEach((item,i)=>{
    lista.innerHTML+=`<li>${item.nombre} x${item.cantidad} - $${item.precio}
    <button onclick="eliminar(${i})">X</button></li>`;
    total+=item.precio;
  });

  document.getElementById("total").textContent="Total: $"+total;
  document.getElementById("contador").textContent=carrito.length;
}

function eliminar(i){
  carrito.splice(i,1);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function enviarWhatsApp(){
  let msg="Pedido:%0A";
  carrito.forEach(i=> msg+=`${i.nombre} x${i.cantidad} - $${i.precio}%0A`);
  window.open("https://wa.me/5491127155891?text="+msg);
}

actualizar();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSyC6p5YWOiGq3XOxmoEbBZKLzO9_7zUsWZI",
  authDomain:"sprinttienda-f52cc.firebaseapp.com",
  projectId:"sprinttienda-f52cc",
  storageBucket:"sprinttienda-f52cc.appspot.com",
  messagingSenderId:"520993829650",
  appId:"1:520993829650:web:8ca662a13b1fc51bc7b9cb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ADMIN
window.activarAdmin = function(){
  if(prompt("Contraseña")==="1234"){
    document.getElementById("adminPanel").style.display="block";
  }
};

// GUARDAR
window.guardarProducto = async function(){

  const nombre = document.getElementById("nombre").value;
  const descripcion = document.getElementById("descripcion").value;
  const file = document.getElementById("imagen").files[0];

  const precios = {
    p1: parseInt(document.getElementById("p1").value),
    p2: parseInt(document.getElementById("p2").value),
    p3: parseInt(document.getElementById("p3").value),
    p4: parseInt(document.getElementById("p4").value),
    p5: parseInt(document.getElementById("p5").value)
  };

  if(!nombre || !descripcion || !file){
    alert("Completa todo");
    return;
  }

  const storageRef = ref(storage,'productos/'+Date.now()+file.name);
  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db,"productos"),{
    nombre,
    descripcion,
    precios,
    imagen:url
  });

  alert("Producto agregado");
  cargarProductos();
};

// CALCULO
function calcularPrecio(precios, cantidad){
  if(cantidad==1) return precios.p1*cantidad;
  if(cantidad<=3) return precios.p2*cantidad;
  if(cantidad<=10) return precios.p3*cantidad;
  if(cantidad<=30) return precios.p4*cantidad;
  return precios.p5*cantidad;
}

// CARGAR
async function cargarProductos(){
  const data = await getDocs(collection(db,"productos"));
  productos.innerHTML="";

  data.forEach(doc=>{
    const p = doc.data();

    productos.innerHTML+=`
    <div class="producto">
      <img src="${p.imagen}">
      <h3>${p.nombre}</h3>
      <p>${p.descripcion}</p>

      <input type="number" min="1" value="1" id="c_${doc.id}">

      <button onclick='agregarProducto("${doc.id}", "${p.nombre}", ${JSON.stringify(p.precios)})'>
        Agregar
      </button>
    </div>`;
  });
}

window.agregarProducto = function(id,nombre,precios){
  let cantidad = parseInt(document.getElementById("c_"+id).value);
  let total = calcularPrecio(precios,cantidad);
  agregar(nombre,total,cantidad);
};

cargarProductos();
</script>

</body>
</html>
