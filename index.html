<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sprint</title>

<style>
:root { --negro:#000; --blanco:#fff; --gris:#f2f2f2; }
body { font-family:Arial; margin:0; background:var(--blanco); }

.hero {
  position:relative; height:350px;
  background:url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover;
  display:flex; align-items:center; justify-content:center; color:white;
}
.hero::before {
  content:""; position:absolute; width:100%; height:100%;
  background:rgba(0,0,0,0.6);
}
.hero-content { position:relative; z-index:2; text-align:center; }

.logo { position:absolute; top:20px; left:30px; height:120px; z-index:3; }

.container { max-width:900px; padding:30px; }

.producto {
  background:var(--gris); padding:20px; margin-bottom:20px; border-radius:10px;
}
.producto img { width:100%; border-radius:10px; }

button {
  background:black; color:white; border:none; padding:10px;
  border-radius:5px; cursor:pointer;
}

/* ADMIN */
.admin { background:#111; color:white; padding:20px; display:none; }
.admin input { width:100%; margin:5px 0; padding:8px; }

.btn-admin {
  position:fixed; bottom:15px; left:15px;
  width:45px; height:45px; border-radius:50%;
  background:black; color:white;
}

/* CARRITO */
.btn-carrito {
  position:fixed; top:20px; right:20px;
  width:65px; height:65px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:black; color:white; font-size:26px;
}

#contador {
  position:absolute; top:-5px; right:-5px;
  background:red; color:white; padding:5px; border-radius:50%;
}

.carrito {
  position:fixed; right:-320px; top:0;
  width:300px; height:100%;
  background:white; padding:20px;
  transition:.3s;
}
.carrito.activo { right:0; }
</style>
</head>

<body>

<div class="hero">
  <img src="Sin título-1-02.png" class="logo">
  <div class="hero-content">
    <h1>Las mejores gorras de ciclismo</h1>
    <p>MODELOS · DISEÑOS · PERSONALIZADOS</p>
  </div>
</div>

<button class="btn-admin" onclick="activarAdmin()">⚙️</button>

<div class="admin" id="adminPanel">
  <h2>Agregar producto</h2>
  <input id="nombre" placeholder="Nombre">
  <input id="descripcion" placeholder="Descripción">
  <input id="precio" placeholder="Precio">
  <input type="file" id="imagen">
  <button onclick="guardarProducto()">Guardar producto</button>
</div>

<div class="container">
  <div id="productos"></div>
</div>

<div class="btn-carrito" onclick="toggleCarrito()">🛒
<span id="contador">0</span>
</div>

<div class="carrito" id="carrito">
  <button onclick="toggleCarrito()">Cerrar</button>
  <h2>Carrito</h2>
  <ul id="lista"></ul>
  <h3 id="total">Total: $0</h3>
  <button onclick="enviarWhatsApp()">Comprar</button>
</div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function toggleCarrito(){
  document.getElementById("carrito").classList.toggle("activo");
}

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function actualizar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  let total=0;

  carrito.forEach((item,i)=>{
    lista.innerHTML+=`<li>${item.nombre} - $${item.precio}
    <button onclick="eliminar(${i})">X</button></li>`;
    total+=item.precio;
  });

  document.getElementById("total").textContent="Total: $"+total;
  document.getElementById("contador").textContent=carrito.length;
}

function eliminar(i){
  carrito.splice(i,1);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizar();
}

function enviarWhatsApp(){
  let msg="Pedido:%0A";
  carrito.forEach(i=> msg+=i.nombre+" - $"+i.precio+"%0A");
  window.open("https://wa.me/5491127155891?text="+msg);
}

actualizar();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSyC6p5YWOiGq3XOxmoEbBZKLzO9_7zUsWZI",
  authDomain:"sprinttienda-f52cc.firebaseapp.com",
  projectId:"sprinttienda-f52cc",
  storageBucket:"sprinttienda-f52cc.appspot.com",
  messagingSenderId:"520993829650",
  appId:"1:520993829650:web:8ca662a13b1fc51bc7b9cb"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

// ADMIN
window.activarAdmin=function(){
  let clave=prompt("Contraseña");
  if(clave==="1234"){
    document.getElementById("adminPanel").style.display="block";
    cargarProductos();
  }
}

// GUARDAR
window.guardarProducto=async function(){
  let nombre=document.getElementById("nombre").value;
  let descripcion=document.getElementById("descripcion").value;
  let precio=parseInt(document.getElementById("precio").value);
  let file=document.getElementById("imagen").files[0];

  if(!file){
    alert("Subí una imagen");
    return;
  }

  try{
    const storageRef=ref(storage,'productos/'+Date.now()+file.name);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);

    await addDoc(collection(db,"productos"),{
      nombre,descripcion,precio,imagen:url
    });

    alert("Producto agregado");

    document.getElementById("nombre").value="";
    document.getElementById("descripcion").value="";
    document.getElementById("precio").value="";
    document.getElementById("imagen").value="";

    cargarProductos();

  }catch(e){
    console.error(e);
    alert("Error al guardar");
  }
}

// CARGAR
async function cargarProductos(){
  const data=await getDocs(collection(db,"productos"));
  let contenedor=document.getElementById("productos");
  contenedor.innerHTML="";

  let esAdmin=document.getElementById("adminPanel").style.display==="block";

  data.forEach(docu=>{
    let p=docu.data();

    contenedor.innerHTML+=`
    <div class="producto">
      <img src="${p.imagen}">
      <h3>${p.nombre}</h3>
      <p>${p.descripcion}</p>
      <strong>$${p.precio}</strong>
      <button onclick="agregar('${p.nombre}',${p.precio})">Agregar</button>
      ${esAdmin ? `<button onclick="eliminarProducto('${docu.id}')">❌</button>` : ""}
    </div>`;
  });
}

// ELIMINAR
window.eliminarProducto=async function(id){
  await deleteDoc(doc(db,"productos",id));
  cargarProductos();
}

cargarProductos();
</script>

</body>
</html>
